<!DOCTYPE html>
<html lang="en">

                <div class="team-member" style="display: inline-block; margin-right: 20px;">
                    <img src="images/my_LI.jpeg" alt="Team Member 1">

                </div>
                <div class="team-member" style="display: inline-block; margin-right: 20px;">
                    <img src="images/srba_LI.jpeg" alt="Team Member 2">

        <section>
            <h2>Contact Us</h2>
            <p> bonjour@swapato.ch</p>

    <footer>
        <p>&copy; 2025 www.swapato.ch. All rights reserved.</p>
    </footer>
